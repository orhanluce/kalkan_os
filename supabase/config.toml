# Supabase yapılandırması. `supabase db push` uzak projeye migration
# uygularken bu dosyayı okur. Yerel stack (`supabase start`) Docker
# gerektirir ve bu makinede kurulu değil — aşağıdaki port'lar yalnızca
# yerel stack kullanılırsa geçerlidir.
project_id = "kalkan-os"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
# Uzak projeyle eşleşmeli — Supabase yeni projelerde Postgres 17 veriyor.
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000"]
jwt_expiry = 3600
enable_signup = true

[storage]
enabled = true
file_size_limit = "20MiB"

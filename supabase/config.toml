# Supabase local dev config. Inert until `supabase` CLI + Docker are set up
# (deferred per project decision — see docs/ROADMAP.md §5.1). Values below
# match Supabase CLI defaults; adjust project_id once a real project exists.
project_id = "kalkan-os"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000"]
jwt_expiry = 3600
enable_signup = true

[storage]
enabled = true
file_size_limit = "20MiB"
